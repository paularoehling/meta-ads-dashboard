<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Ads Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFF8F9;--sur:#FFFFFF;--bdr:#F5D6DD;--bdr2:#EDBED0;
  --pink:#E8427C;--pink3:#FFB3CE;--pink4:#FDE8EF;
  --dark:#2D1B24;--mid:#7A4A5A;--light:#B08090;
  --ok:#2EC4A0;--pause:#E8427C;--warn:#F4A23E;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
.app{max-width:1080px;margin:0 auto;padding:40px 28px 80px}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:40px;gap:20px;padding-bottom:32px;border-bottom:1.5px solid var(--bdr)}
.logo-badge{display:inline-flex;align-items:center;gap:8px;background:var(--pink4);border:1px solid var(--pink3);border-radius:100px;padding:6px 14px;margin-bottom:16px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--pink);animation:pulse 2s infinite}
.logo-text{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--pink);text-transform:uppercase}
h1{font-family:'Playfair Display',serif;font-size:clamp(32px,5vw,52px);font-weight:700;line-height:1.05;color:var(--dark);margin-bottom:6px}
h1 em{font-style:italic;color:var(--pink)}
.period-pill{background:var(--pink4);border:1px solid var(--pink3);border-radius:100px;padding:8px 18px;font-family:'DM Mono',monospace;font-size:11px;color:var(--pink);display:inline-block}
.date-text{font-size:11px;color:var(--light);margin-top:6px;font-family:'DM Mono',monospace}
.sec-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--light);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--bdr)}
.alerts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;margin-bottom:36px}
.alert-card{border-radius:14px;padding:18px;border:1px solid;background:var(--sur)}
.alert-card.pause{border-color:#F9BED0;background:#FFF5F8}
.alert-card.scale{border-color:#A8E8DC;background:#F0FBF8}
.alert-card.warn{border-color:#FAD9A8;background:#FFF8EE}
.a-tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:100px;margin-bottom:12px;font-family:'DM Mono',monospace}
.pause .a-tag{background:#FFE0EA;color:var(--pause)}
.scale .a-tag{background:#C8F0E8;color:#1A9E84}
.warn .a-tag{background:#FDECD0;color:#C07818}
.a-marca{font-size:10px;color:var(--light);margin-bottom:5px;font-family:'DM Mono',monospace}
.a-titulo{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:7px;line-height:1.4}
.a-dato{font-size:12px;color:var(--mid);line-height:1.6}
.a-accion{margin-top:12px;font-size:12px;font-weight:600;padding:8px 16px;border-radius:100px;cursor:pointer;border:1.5px solid;background:transparent;display:inline-block}
.pause .a-accion{color:var(--pause);border-color:#F9BED0}
.scale .a-accion{color:#1A9E84;border-color:#A8E8DC}
.warn .a-accion{color:#C07818;border-color:#FAD9A8}
.marcas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:36px}
.marca-card{background:var(--sur);border:1.5px solid var(--bdr);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .22s}
.marca-card:hover{border-color:var(--pink3);transform:translateY(-3px);box-shadow:0 8px 24px rgba(232,66,124,.08)}
.mc-accent{height:4px}
.mc-head{padding:18px 20px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bdr)}
.mc-nombre{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--dark);flex:1}
.mc-status{font-size:10px;padding:4px 12px;border-radius:100px;font-family:'DM Mono',monospace;font-weight:600}
.st-ok{background:#E8FAF5;color:#1A9E84;border:1px solid #A8E8DC}
.st-alert{background:#FFF0F4;color:var(--pause);border:1px solid #F9BED0}
.st-warn{background:#FFF8EE;color:#C07818;border:1px solid #FAD9A8}
.mc-body{padding:18px 20px}
.kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.kpi{text-align:center;padding:12px 8px;background:var(--bg);border-radius:10px}
.kpi-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--dark);line-height:1;margin-bottom:4px}
.kpi-val.up{color:var(--ok)}.kpi-val.down{color:var(--pause)}
.kpi-label{font-size:9px;color:var(--light);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em}
.kpi-delta{font-size:11px;margin-top:3px;font-family:'DM Mono',monospace}
.kpi-delta.up{color:var(--ok)}.kpi-delta.down{color:var(--pause)}
.mc-insight{font-size:12px;color:var(--mid);line-height:1.6;padding-top:12px;border-top:1px solid var(--bdr)}
.hist-list{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.hist-item{background:var(--sur);border:1.5px solid var(--bdr);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .2s}
.hist-item:hover{border-color:var(--pink3);background:var(--pink4)}
.hist-period{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--dark);flex:1}
.hist-meta{font-size:11px;color:var(--light);font-family:'DM Mono',monospace}
.hist-brands{display:flex;gap:5px;align-items:center}
.hist-dot{width:8px;height:8px;border-radius:50%}
.hist-source{font-size:9px;padding:2px 8px;border-radius:100px;background:var(--pink4);color:var(--pink);font-family:'DM Mono',monospace;border:1px solid var(--pink3)}
.btn-load{padding:7px 14px;background:var(--pink);border:none;border-radius:100px;color:#fff;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-load:hover{background:#D03870}
.empty{text-align:center;padding:56px 24px;background:var(--sur);border:1.5px dashed var(--bdr);border-radius:16px}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.empty-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--mid);margin-bottom:8px}
.empty-sub{font-size:13px;color:var(--light);line-height:1.7}
.loading-wrap{text-align:center;padding:40px;color:var(--mid)}
.spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--bdr2);border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px;display:block;margin:0 auto 12px}
.sync-btn{display:flex;align-items:center;gap:8px;padding:10px 20px;background:none;border:1.5px solid var(--bdr2);border-radius:100px;color:var(--mid);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;margin-left:auto}
.sync-btn:hover{border-color:var(--pink);color:var(--pink)}
.sync-btn.loading{opacity:.6;pointer-events:none}
.toast{position:fixed;bottom:28px;right:28px;background:var(--sur);border:1.5px solid var(--bdr2);border-radius:12px;padding:13px 22px;font-size:13px;z-index:200;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;box-shadow:0 4px 20px rgba(232,66,124,.1)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{border-color:#A8E8DC;color:#1A9E84}
.toast.err{border-color:#F9BED0;color:var(--pause)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:600px){.marcas-grid,.alerts-grid{grid-template-columns:1fr}.kpi-row{grid-template-columns:1fr 1fr}.header{flex-direction:column}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="logo-badge"><div class="logo-dot"></div><span class="logo-text">Meta Ads Intelligence</span></div>
      <h1>Campaign<br><em>Dashboard</em></h1>
    </div>
    <div style="text-align:right;padding-top:8px">
      <div class="period-pill" id="period-pill">Cargando reportes...</div>
      <div class="date-text" id="last-update"></div>
      <button class="sync-btn" id="sync-btn" onclick="syncGitHub()" style="margin-top:10px">
        🔄 Sincronizar con GitHub
      </button>
    </div>
  </div>

  <div id="alerts-wrap" style="display:none">
    <div class="sec-label">Acciones urgentes esta semana</div>
    <div class="alerts-grid" id="alerts-grid"></div>
  </div>

  <div id="marcas-wrap" style="display:none">
    <div class="sec-label">Rendimiento por marca</div>
    <div class="marcas-grid" id="marcas-grid"></div>
  </div>

  <div style="display:flex;align-items:center;margin-top:36px">
    <div class="sec-label" style="flex:1;margin-bottom:0">Reportes en GitHub</div>
  </div>
  <div id="hist-wrap" style="margin-top:16px">
    <div class="loading-wrap"><div class="spinner"></div><div style="font-family:'DM Mono',monospace;font-size:12px">Conectando con GitHub...</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const GITHUB_TOKEN = null;
const GITHUB_REPO  = 'paularoehling/meta-ads-dashboard';
const REPORTS_PATH = 'reportes';

const BRAND_COLORS = {seducete:'#E8427C',gonails:'#2EC4A0',gohair:'#F472A8',
  bluesky:'#7B9CF4','nail pro':'#F4A23E','le mini':'#C97BD4','nail outlet':'#F4A23E'};
function getBrandColor(n){const k=n.toLowerCase();for(const[b,c]of Object.entries(BRAND_COLORS))if(k.includes(b))return c;return'#E8427C'}

function toast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',3500)}
function sf(v){if(v==null||v==='')return 0;return parseFloat(String(v).replace(/[$,\s]/g,''))||0}
function pct(n,o){if(!o||o===0)return null;return(n-o)/Math.abs(o)}
function fmtP(v){if(v==null)return'—';return(v>=0?'+':'')+Math.round(v*100)+'%'}
function fmtC(v){if(!v)return'$0';return'$'+Math.round(v).toLocaleString('es-CL')}

// ── GITHUB API ────────────────────────────────────────────────────────────────
async function githubGet(path){
  const r=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`,{
    headers:{'Accept':'application/vnd.github+json'}
  });
  if(!r.ok)throw new Error('GitHub API error: '+r.status);
  return r.json();
}

async function listReports(){
  try{
    const files=await githubGet(REPORTS_PATH);
    return files.filter(f=>f.name.endsWith('.xlsx')||f.name.endsWith('.xls')||f.name.endsWith('.csv'))
      .sort((a,b)=>b.name.localeCompare(a.name));
  }catch(e){
    console.warn('No se pudo listar reportes:',e.message);
    return[];
  }
}

async function downloadReport(file){
  const r=await fetch(file.download_url,{
    headers:{}
  });
  if(!r.ok)throw new Error('Error descargando '+file.name);
  return r.arrayBuffer();
}

// ── PARSE EXCEL ───────────────────────────────────────────────────────────────
function parseReport(buffer, filename){
  const wb=XLSX.read(buffer,{type:'array'});
  const marcas=[];
  wb.SheetNames.forEach(sn=>{
    if(['resumen','hallazgo','resultados'].some(x=>sn.toLowerCase().includes(x)))return;
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
    if(rows.length<3)return;
    let hi=-1;
    for(let i=0;i<Math.min(rows.length,6);i++){
      const r=rows[i].map(c=>String(c||'').toLowerCase());
      if(r.some(c=>c.includes('anuncio')||c.includes('campaña')||c.includes('gasto'))){hi=i;break}
    }
    if(hi<0)return;
    const H=rows[hi].map(c=>String(c||'').trim());
    const cG=H.findIndex(h=>h.toLowerCase().includes('gasto')||h.toLowerCase().includes('spent'));
    const cR=H.findIndex(h=>h.toLowerCase().includes('result')||h.toLowerCase().includes('conv'));
    const cRA=H.findIndex(h=>h.toLowerCase().includes('anterior')||h.toLowerCase().includes('prev'));
    const cH=H.findIndex(h=>h.toLowerCase().includes('hook'));
    const cA=H.findIndex(h=>h.toLowerCase().includes('anuncio')||h.toLowerCase().includes('campaña'));
    const cS=H.findIndex(h=>h.toLowerCase().includes('status'));
    const ads=[];
    for(let i=hi+1;i<rows.length;i++){
      const row=rows[i];if(!row||row.every(c=>c===''||c==null))continue;
      const nom=String(row[Math.max(0,cA)]||'').trim();
      if(!nom||nom.toLowerCase().includes('total')||nom.toLowerCase().includes('leyenda'))continue;
      const g=cG>=0?sf(row[cG]):0,r=cR>=0?sf(row[cR]):0;if(g===0&&r===0)continue;
      ads.push({nombre:nom,gasto:g,res:r,resAnt:cRA>=0?sf(row[cRA]):0,
        hook:cH>=0?sf(row[cH]):0,status:cS>=0?String(row[cS]||''):''});
    }
    if(!ads.length)return;
    const tG=ads.reduce((s,a)=>s+a.gasto,0),tR=ads.reduce((s,a)=>s+a.res,0),tRA=ads.reduce((s,a)=>s+a.resAnt,0);
    marcas.push({
      nombre:sn,ads,totalGasto:tG,totalRes:tR,totalResAnt:tRA,
      pausar:ads.filter(a=>a.status.includes('PAUSAR')||a.status.includes('⛔')),
      escalar:ads.filter(a=>a.status.includes('GANADOR')||a.status.includes('🏆')),
      fatiga:ads.filter(a=>a.status.includes('FATIGA')||a.status.includes('⚠️')),
      avgHook:ads.filter(a=>a.hook>0).reduce((s,a,_,arr)=>s+a.hook/arr.length,0)
    });
  });
  // Extraer período del nombre de archivo
  const nm=filename.match(/(\w+)[_-](\d{4})/i);
  const period=nm?nm[1]+' '+nm[2]:filename.replace('.xlsx','').replace('.xls','');
  return{period,marcas,filename};
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderDashboard(report){
  const{marcas,period}=report;
  document.getElementById('period-pill').textContent=period||'Reporte cargado';
  document.getElementById('last-update').textContent='Fuente: GitHub · reportes/'+report.filename;

  // ALERTAS
  const ag=document.getElementById('alerts-grid');ag.innerHTML='';
  const alertas=[];
  marcas.forEach(m=>{
    m.pausar.slice(0,2).forEach(a=>alertas.push({tipo:'pause',marca:m.nombre,titulo:a.nombre.replace('🆕 ','').substring(0,45),dato:'Gasto: '+fmtC(a.gasto)+' · Sin conversiones proporcionales',accion:'Pausar ahora'}));
    m.escalar.slice(0,1).forEach(a=>alertas.push({tipo:'scale',marca:m.nombre,titulo:a.nombre.replace('🆕 ','').substring(0,45),dato:Math.round(a.res)+' conversiones · Mejor rendimiento del período',accion:'Escalar presupuesto'}));
    m.fatiga.slice(0,1).forEach(a=>alertas.push({tipo:'warn',marca:m.nombre,titulo:a.nombre.replace('🆕 ','').substring(0,45),dato:'Frecuencia alta · Audiencia sobreexpuesta',accion:'Rotar creativo'}));
  });
  if(!alertas.length){ag.innerHTML='<div style="color:var(--light);font-size:13px;grid-column:1/-1;padding:8px 0">No se detectaron alertas urgentes esta semana ✨</div>'}
  else alertas.slice(0,6).forEach(a=>{
    const icon=a.tipo==='pause'?'⛔':a.tipo==='scale'?'🚀':'⚠️';
    const label=a.tipo==='pause'?'Pausar':a.tipo==='scale'?'Escalar':'Fatiga';
    ag.innerHTML+=`<div class="alert-card ${a.tipo}"><div class="a-tag">${icon} ${label}</div><div class="a-marca">${a.marca}</div><div class="a-titulo">${a.titulo}</div><div class="a-dato">${a.dato}</div><div class="a-accion">${a.accion} →</div></div>`;
  });
  document.getElementById('alerts-wrap').style.display='block';

  // MARCAS
  const mg=document.getElementById('marcas-grid');mg.innerHTML='';
  marcas.forEach(m=>{
    const color=getBrandColor(m.nombre);
    const dR=pct(m.totalRes,m.totalResAnt);
    const stC=m.pausar.length?'st-alert':m.fatiga.length?'st-warn':'st-ok';
    const stT=m.pausar.length?'⛔ '+m.pausar.length+' por pausar':m.fatiga.length?'⚠️ Fatiga':'✓ En rango';
    mg.innerHTML+=`<div class="marca-card"><div class="mc-accent" style="background:${color}"></div>
      <div class="mc-head"><div class="mc-nombre">${m.nombre}</div><div class="mc-status ${stC}">${stT}</div></div>
      <div class="mc-body">
        <div class="kpi-row">
          <div class="kpi"><div class="kpi-val" style="font-size:16px">${fmtC(m.totalGasto)}</div><div class="kpi-label">Gasto total</div></div>
          <div class="kpi"><div class="kpi-val ${dR===null?'':(dR>=0?'up':'down')}">${Math.round(m.totalRes).toLocaleString('es-CL')}</div><div class="kpi-label">Resultados</div><div class="kpi-delta ${dR===null?'':(dR>=0?'up':'down')}">${fmtP(dR)} vs ant.</div></div>
          <div class="kpi"><div class="kpi-val" style="font-size:18px">${Math.round(m.avgHook*10)/10||'—'}%</div><div class="kpi-label">Hook Rate</div></div>
        </div>
        <div class="mc-insight">${m.escalar.length?'🏆 '+m.escalar.length+' para escalar  ·  ':''} ${m.pausar.length?'⛔ '+m.pausar.length+' para pausar  ·  ':''} ${m.ads.length} anuncios activos</div>
      </div></div>`;
  });
  document.getElementById('marcas-wrap').style.display='block';
}

function renderHistorial(files, currentFile){
  const c=document.getElementById('hist-wrap');
  if(!files.length){
    c.innerHTML='<div class="empty"><div class="empty-icon">🌸</div><div class="empty-title">Sin reportes en GitHub</div><div class="empty-sub">n8n subirá los reportes automáticamente a la carpeta reportes/ cada mes.</div></div>';
    return;
  }
  c.innerHTML='<div class="hist-list">'+files.map((f,i)=>{
    const isActive=f.name===currentFile;
    const nm=f.name.match(/(\w+)[_-](\d{4})/i);
    const period=nm?nm[1]+' '+nm[2]:f.name.replace('.xlsx','');
    return`<div class="hist-item" style="${isActive?'border-color:var(--pink);background:var(--pink4)':''}" onclick="loadFile(${i})">
      <div class="hist-brands"><div class="hist-dot" style="background:var(--pink)"></div></div>
      <div class="hist-period">${period}</div>
      <div class="hist-meta">${f.name}</div>
      <span class="hist-source">GitHub</span>
      <button class="btn-load" onclick="event.stopPropagation();loadFile(${i})">${isActive?'✓ Activo':'Cargar'}</button>
    </div>`;
  }).join('')+'</div>';
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
let githubFiles=[];

async function syncGitHub(){
  const btn=document.getElementById('sync-btn');
  btn.classList.add('loading');btn.textContent='🔄 Sincronizando...';
  try{
    githubFiles=await listReports();
    if(githubFiles.length===0){
      document.getElementById('hist-wrap').innerHTML='<div class="empty"><div class="empty-icon">🌸</div><div class="empty-title">Sin reportes aún</div><div class="empty-sub">n8n subirá los reportes automáticamente cada mes a la carpeta reportes/ de GitHub.</div></div>';
      toast('No hay reportes en GitHub todavía');
    }else{
      renderHistorial(githubFiles, null);
      // Cargar el más reciente automáticamente
      await loadFile(0);
      toast('✓ '+githubFiles.length+' reporte(s) encontrado(s) en GitHub');
    }
  }catch(e){
    toast('Error conectando con GitHub: '+e.message,'err');
    document.getElementById('hist-wrap').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Error de conexión</div><div class="empty-sub">No se pudo conectar con GitHub. Verifica tu conexión a internet.</div></div>';
  }
  btn.classList.remove('loading');btn.textContent='🔄 Sincronizar con GitHub';
}

async function loadFile(idx){
  const file=githubFiles[idx];
  if(!file)return;
  document.getElementById('period-pill').textContent='Cargando '+file.name+'...';
  try{
    const buffer=await downloadReport(file);
    const report=parseReport(buffer, file.name);
    if(!report.marcas.length){toast('No se encontraron datos de marcas en '+file.name,'err');return}
    report.filename=file.name;
    renderDashboard(report);
    renderHistorial(githubFiles, file.name);
    toast('✓ '+report.marcas.length+' marcas cargadas desde GitHub');
  }catch(e){
    toast('Error cargando '+file.name+': '+e.message,'err');
  }
}

// Iniciar sincronización automática al cargar
syncGitHub();
</script>
</body>
</html>
