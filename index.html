<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Ads — Decisiones</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FDF9FA;--sur:#FFFFFF;--bdr:rgba(180,130,150,0.18);--bdr2:rgba(180,130,150,0.32);
  --pk:#D4537E;--pk50:#FBEAF0;--pk100:#F4C0D1;--pk800:#72243E;
  --red50:#FCEBEB;--red100:#F7C1C1;--red400:#E24B4A;--red800:#791F1F;
  --green50:#EAF3DE;--green100:#C0DD97;--green400:#639922;--green800:#27500A;
  --amber50:#FAEEDA;--amber100:#FAC775;--amber400:#BA7517;--amber800:#633806;
  --gray50:#F1EFE8;--gray100:#D3D1C7;--gray400:#888780;--gray800:#444441;
  --blue50:#E6F1FB;--blue100:#B5D4F4;--blue400:#378ADD;--blue800:#0C447C;
  --dk:#1E1218;--mid:#6B3D52;--lt:#A07080;
  --radius:10px;--radius-lg:14px;
}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--dk);min-height:100vh;font-size:14px}

/* TOP BAR */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--sur);border-bottom:0.5px solid var(--bdr2);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:28px;height:28px;border-radius:8px;background:var(--pk);display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round}
.logo-text{font-family:'Playfair Display',serif;font-size:16px;color:var(--dk)}
.logo-text span{color:var(--pk);font-style:italic}
.top-center{display:flex;align-items:center;gap:6px}
.period-btn{font-size:12px;color:var(--lt);background:none;border:0.5px solid var(--bdr);border-radius:20px;padding:5px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.period-btn:hover{border-color:var(--pk100);color:var(--mid)}
.period-btn.active{background:var(--pk50);border-color:var(--pk100);color:var(--pk800);font-weight:500}
.top-right{display:flex;align-items:center;gap:8px}
.sync-btn{font-size:12px;font-weight:500;background:var(--dk);color:#fff;border:none;border-radius:var(--radius);padding:7px 16px;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;transition:background .15s}
.sync-btn:hover{background:var(--pk)}
.sync-btn svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sync-btn:disabled{opacity:.5;cursor:not-allowed}

/* LAYOUT */
.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 53px)}

/* SIDEBAR */
.sidebar{background:var(--sur);border-right:0.5px solid var(--bdr2);padding:16px 0;overflow-y:auto}
.sidebar-section{margin-bottom:20px}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--lt);text-transform:uppercase;padding:0 16px 8px}
.marca-item{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;cursor:pointer;transition:background .1s;border-left:2px solid transparent}
.marca-item:hover{background:var(--bg)}
.marca-item.active{background:var(--pk50);border-left-color:var(--pk);border-radius:0}
.marca-left{display:flex;align-items:center;gap:9px}
.marca-avatar{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.marca-info-text{}
.marca-name{font-size:13px;font-weight:500;color:var(--dk);line-height:1.2}
.marca-sub{font-size:11px;color:var(--lt);margin-top:1px}
.marca-health{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.marca-health.red{background:var(--red400)}
.marca-health.amber{background:var(--amber400)}
.marca-health.green{background:var(--green400)}
.marca-health.gray{background:var(--gray400)}
.divider{height:0.5px;background:var(--bdr);margin:8px 16px}
.filter-item{display:flex;align-items:center;gap:8px;padding:6px 16px;font-size:12px;color:var(--lt);cursor:pointer;border-radius:0;transition:all .1s}
.filter-item:hover{background:var(--bg);color:var(--mid)}
.filter-item.active{color:var(--pk);font-weight:500}
.filter-item svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:0.5px solid var(--bdr2);padding:0 24px;background:var(--sur)}
.tab{font-size:13px;padding:11px 16px;cursor:pointer;color:var(--lt);border-bottom:2px solid transparent;margin-bottom:-0.5px;display:flex;align-items:center;gap:7px;font-weight:400;white-space:nowrap;transition:color .15s}
.tab:hover{color:var(--mid)}
.tab.active{color:var(--pk800);border-bottom-color:var(--pk);font-weight:500}
.tab svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tab-count{font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;line-height:1.4}
.tab-count.red{background:var(--red50);color:var(--red800)}
.tab-count.green{background:var(--green50);color:var(--green800)}
.tab-count.blue{background:var(--blue50);color:var(--blue800)}
.tab-count.gray{background:var(--gray50);color:var(--gray800)}

/* CONTENT */
.content-wrap{padding:20px 24px;overflow-y:auto}

/* BRAND HEADER */
.brand-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.brand-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--dk)}
.brand-meta{font-size:12px;color:var(--lt);margin-top:3px}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
.stat-card{background:var(--sur);border:0.5px solid var(--bdr);border-radius:var(--radius);padding:12px 14px}
.stat-label{font-size:11px;color:var(--lt);margin-bottom:5px;font-weight:500}
.stat-val{font-size:20px;font-weight:600;color:var(--dk);line-height:1}
.stat-delta{font-size:11px;margin-top:4px;display:flex;align-items:center;gap:3px}
.stat-delta.up{color:var(--green400)}
.stat-delta.down{color:var(--red400)}
.stat-delta.neutral{color:var(--lt)}
.stat-delta svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px}
.sec-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.sec-title svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* URGENTE STRIP */
.urgente-strip{background:var(--red50);border:0.5px solid var(--red100);border-radius:var(--radius);padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px}
.urgente-icon{width:28px;height:28px;border-radius:7px;background:var(--red100);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.urgente-icon svg{width:14px;height:14px;stroke:var(--red400);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.urgente-body{flex:1;min-width:0}
.urgente-name{font-size:13px;font-weight:500;color:var(--red800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.urgente-reason{font-size:11px;color:var(--red400);margin-top:2px}
.urgente-action{font-size:11px;font-weight:600;color:var(--red800);background:var(--sur);border:0.5px solid var(--red100);border-radius:8px;padding:5px 12px;white-space:nowrap;cursor:pointer;flex-shrink:0;font-family:'DM Sans',sans-serif;transition:background .1s}
.urgente-action:hover{background:var(--red100)}

/* OPP STRIP */
.opp-strip{background:var(--green50);border:0.5px solid var(--green100);border-radius:var(--radius);padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px}
.opp-icon{width:28px;height:28px;border-radius:7px;background:var(--green100);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.opp-icon svg{width:14px;height:14px;stroke:var(--green400);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.opp-body{flex:1;min-width:0}
.opp-name{font-size:13px;font-weight:500;color:var(--green800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.opp-reason{font-size:11px;color:var(--green400);margin-top:2px}
.opp-action{font-size:11px;font-weight:600;color:var(--green800);background:var(--sur);border:0.5px solid var(--green100);border-radius:8px;padding:5px 12px;white-space:nowrap;cursor:pointer;flex-shrink:0;font-family:'DM Sans',sans-serif;transition:background .1s}
.opp-action:hover{background:var(--green100)}

/* CAMPAIGN CARD */
.camp-card{background:var(--sur);border:0.5px solid var(--bdr);border-radius:var(--radius-lg);margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.camp-card:hover{border-color:var(--bdr2)}
.camp-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none}
.camp-type-icon{width:30px;height:30px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.camp-type-icon svg{width:14px;height:14px;stroke:var(--mid);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.camp-info{flex:1;min-width:0}
.camp-name{font-size:13px;font-weight:500;color:var(--dk);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.camp-kpi-label{font-size:11px;color:var(--lt);margin-top:2px}
.camp-right{display:flex;align-items:center;gap:9px;flex-shrink:0}
.camp-spend{font-size:12px;color:var(--lt);font-variant-numeric:tabular-nums}
.status-pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.status-pill.ganador{background:var(--green50);color:var(--green800);border:0.5px solid var(--green100)}
.status-pill.ok{background:var(--blue50);color:var(--blue800);border:0.5px solid var(--blue100)}
.status-pill.revisar{background:var(--amber50);color:var(--amber800);border:0.5px solid var(--amber100)}
.status-pill.pausar{background:var(--red50);color:var(--red800);border:0.5px solid var(--red100)}
.status-pill.neutro{background:var(--gray50);color:var(--gray800);border:0.5px solid var(--gray100)}
.chev{width:14px;height:14px;stroke:var(--lt);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s;flex-shrink:0}
.chev.open{transform:rotate(90deg)}

/* AD TABLE */
.ad-section{border-top:0.5px solid var(--bdr);padding:4px 14px 12px}
.ad-hdr{display:grid;gap:6px;padding:8px 8px 4px;font-size:10px;font-weight:600;color:var(--lt);letter-spacing:.06em;text-transform:uppercase}
.ad-row{display:grid;gap:6px;padding:7px 8px;border-radius:8px;align-items:center;margin-bottom:2px;cursor:default;transition:background .1s}
.ad-row:hover{background:var(--bg)}
.ad-row.best{background:var(--green50)}
.ad-row.warn{background:var(--amber50)}
.ad-row.bad{background:var(--red50)}
.ad-name-wrap{display:flex;align-items:center;gap:5px;min-width:0}
.ad-name{font-size:12px;color:var(--dk);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:400}
.ad-tag{font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.ad-tag.best{background:var(--green100);color:var(--green800)}
.ad-tag.pause{background:var(--red100);color:var(--red800)}
.ad-tag.warn{background:var(--amber100);color:var(--amber800)}
.ad-cell{font-size:12px;color:var(--dk);text-align:right;font-variant-numeric:tabular-nums}
.ad-cell.muted{color:var(--lt)}
.ad-cell.good{color:var(--green400);font-weight:500}
.ad-cell.bad{color:var(--red400);font-weight:500}
.ad-cell.warn{color:var(--amber400);font-weight:500}
.hook-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.hook-bar-bg{width:44px;height:3px;background:var(--bdr2);border-radius:2px}
.hook-bar-fill{height:3px;border-radius:2px;transition:width .3s}

/* STATUS BADGE inline */
.inline-status{font-size:9px;font-weight:600;padding:2px 6px;border-radius:8px;white-space:nowrap}
.inline-status.ganador{background:var(--green50);color:var(--green800)}
.inline-status.ok{background:var(--blue50);color:var(--blue800)}
.inline-status.revisar{background:var(--amber50);color:var(--amber800)}
.inline-status.pausar{background:var(--red50);color:var(--red800)}
.inline-status.neutro{background:var(--gray50);color:var(--gray800)}

/* EMPTY / LOADING / ERROR */
.state-box{padding:48px 24px;text-align:center}
.spinner{width:32px;height:32px;border:2.5px solid var(--pk100);border-top-color:var(--pk);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.state-title{font-size:13px;font-weight:500;color:var(--mid);margin-bottom:4px}
.state-sub{font-size:12px;color:var(--lt)}
.error-box{background:var(--red50);border:0.5px solid var(--red100);border-radius:var(--radius-lg);padding:16px 20px;margin:16px 0}
.error-box p{font-size:13px;color:var(--red800)}

/* NO DATA */
.empty{padding:32px;text-align:center;color:var(--lt);font-size:13px}

/* INSIGHTS CLAUDE */
.ins-section{padding:10px 14px 12px;border-top:0.5px solid var(--bdr);background:var(--bg)}
.ins-hdr{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--lt);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.ins-hdr svg{width:11px;height:11px;flex-shrink:0}
.hallazgo-card{border-radius:8px;padding:9px 11px;margin-bottom:6px;border:0.5px solid transparent}
.hallazgo-card.alerta{background:var(--red50);border-color:var(--red100)}
.hallazgo-card.oportunidad{background:var(--green50);border-color:var(--green100)}
.hallazgo-card.insight{background:var(--blue50);border-color:var(--blue100)}
.hallazgo-tipo{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.hallazgo-card.alerta .hallazgo-tipo{color:var(--red400)}
.hallazgo-card.oportunidad .hallazgo-tipo{color:var(--green400)}
.hallazgo-card.insight .hallazgo-tipo{color:var(--blue400)}
.hallazgo-titulo{font-size:12px;font-weight:600;color:var(--dk);margin-bottom:4px;line-height:1.3}
.hallazgo-desc{font-size:11px;color:var(--mid);line-height:1.5;margin-bottom:6px}
.hallazgo-accion-lbl{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--lt);margin-bottom:2px}
.hallazgo-accion{font-size:11px;color:var(--dk);background:rgba(255,255,255,.75);border-radius:6px;padding:5px 8px;line-height:1.4;font-weight:500}
.brand-resumen{font-size:12px;color:var(--mid);line-height:1.6;padding:10px 14px;background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--radius);margin-bottom:16px;font-style:italic;display:flex;gap:8px;align-items:flex-start}
.brand-resumen-icon{flex-shrink:0;font-size:13px}

/* REPORTE CLAUDE TABLE */
.claude-report{margin-top:32px;border:0.5px solid var(--bdr);border-radius:var(--radius-lg);overflow:hidden}
.claude-report-hdr{background:var(--dk);padding:14px 18px;display:flex;align-items:center;gap:8px}
.claude-report-hdr-title{font-size:12px;font-weight:600;color:#fff;letter-spacing:.04em}
.claude-report-resumen{font-size:12px;color:var(--mid);line-height:1.6;padding:12px 18px;background:var(--bg);border-bottom:0.5px solid var(--bdr);font-style:italic}
.claude-report table{width:100%;border-collapse:collapse}
.claude-report th{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--lt);padding:9px 14px;background:var(--sur);border-bottom:0.5px solid var(--bdr);text-align:left}
.claude-report td{font-size:12px;padding:10px 14px;vertical-align:top;border-bottom:0.5px solid var(--bdr);line-height:1.5;color:var(--dk)}
.claude-report tr:last-child td{border-bottom:none}
.claude-report tr.alerta td{background:#FEF8F8}
.claude-report tr.oportunidad td{background:#F5FCF7}
.claude-report tr.insight td{background:#F4F9FE}
.cr-camp{font-size:11px;color:var(--lt);font-weight:500}
.cr-tipo{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:20px;white-space:nowrap}
.cr-tipo.alerta{background:var(--red100);color:var(--red800)}
.cr-tipo.oportunidad{background:var(--green100);color:var(--green800)}
.cr-tipo.insight{background:var(--blue100);color:var(--blue800)}
.cr-titulo{font-weight:600;color:var(--dk);margin-bottom:3px;font-size:12px}
.cr-desc{font-size:11px;color:var(--mid);line-height:1.5}
.cr-accion{font-size:11px;font-weight:500;color:var(--dk);background:rgba(255,255,255,.8);border-radius:6px;padding:5px 8px;margin-top:4px;border:0.5px solid var(--bdr)}

/* HISTORIAL */
.hist-section{margin-top:32px;padding-top:20px;border-top:0.5px solid var(--bdr)}
.hist-label{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--lt);text-transform:uppercase;margin-bottom:10px}
.hist-list{display:flex;gap:8px;flex-wrap:wrap}
.hist-item{background:var(--sur);border:0.5px solid var(--bdr);border-radius:var(--radius);padding:8px 14px;font-size:12px;color:var(--mid);cursor:pointer;transition:all .15s;font-weight:500}
.hist-item:hover{border-color:var(--pk100);color:var(--pk800)}
.hist-item.active{border-color:var(--pk);color:var(--pk800);background:var(--pk50)}

/* FRAMEWORK FOOTER */
.framework{margin-top:32px;background:var(--dk);border-radius:var(--radius-lg);padding:18px 20px}
.fw-label{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--lt);text-transform:uppercase;margin-bottom:12px}
.fw-steps{display:flex;align-items:center;justify-content:center;gap:0;flex-wrap:wrap}
.fw-step{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;min-width:90px;padding:4px}
.fw-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.fw-title{font-size:11px;font-weight:500;color:#fff;text-align:center;line-height:1.3}
.fw-sub{font-size:10px;color:#6B4A5A;text-align:center;line-height:1.3}
.fw-arrow{color:#3A2830;font-size:16px;padding-top:6px;flex-shrink:0}
.fw-note{text-align:center;font-size:11px;color:#4A2A3A;margin-top:12px}

@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .top-center{display:none}
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16"><polyline points="2,12 5,7 8,9 11,4 14,6"/></svg>
    </div>
    <span class="logo-text">Meta Ads <span>Decisiones</span></span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:3px"><div class="top-center" id="periodButtons"></div><span id="rangeBadge" style="font-size:11px;color:var(--lt)"></span></div>
  <div class="top-right">
    <button class="sync-btn" id="syncBtn" onclick="syncGitHub()">
      <svg viewBox="0 0 16 16"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5"/><polyline points="13.5,2.5 13.5,5.5 10.5,5.5"/></svg>
      Sincronizar
    </button>
  </div>
</div>

<div style="display:flex;flex-direction:column">
  <div class="tabs" id="tabBar">
    <div class="tab active" data-tab="urgente" onclick="switchTab('urgente')">
      <svg viewBox="0 0 16 16"><path d="M8 2L14 13H2Z"/><line x1="8" y1="7" x2="8" y2="10"/><circle cx="8" cy="12" r=".5" fill="currentColor"/></svg>
      Acción urgente
      <span class="tab-count red" id="cnt-urgente">0</span>
    </div>
    <div class="tab" data-tab="oportunidades" onclick="switchTab('oportunidades')">
      <svg viewBox="0 0 16 16"><polyline points="1,11 5,6 9,8 15,3"/><polyline points="11,3 15,3 15,7"/></svg>
      Oportunidades
      <span class="tab-count green" id="cnt-oport">0</span>
    </div>

<script>
const BASE_URL = 'https://paularoehling.github.io/meta-ads-dashboard/reportes';
const RAW_URL = 'https://raw.githubusercontent.com/paularoehling/meta-ads-dashboard/main/reportes';

let allMarcas = [];
let allReports = [];
let currentReport = null;
let activeTab = 'urgente';
let activeMarca = null;
let activeFilter = 'all';

// ── TIPOS ──────────────────────────────────────────────────────────────────────
const TIPOS = {
  conversion:{icon:'conversion',label:'Conversión — Compras',kpiLabel:'KPI: costo/compra · ROAS',benchmark:'< $10.000/compra',
    evaluar(c){
      const s=c.status;
      if(s.includes('GANADOR')) return {cls:'ganador',titulo:'Costo por compra excelente',desc:`Costo ${fmt(c.costoPorR)}/compra bajo benchmark. Mantener activo y testear variaciones del mismo concepto creativo.`};
      if(s.includes('PAUSAR')) return {cls:'pausar',titulo:'Costo excesivo — pausar',desc:`${fmt(c.costoPorR)}/compra supera el benchmark de $10.000. Revisar audiencia o pausar el anuncio.`};
      if(s.includes('FATIGA')) return {cls:'revisar',titulo:'Audiencia con fatiga',desc:`Frecuencia ${c.frecuencia?.toFixed(1)}x alta. Renovar imagen o ampliar segmentación.`};
      if(s.includes('REVISAR')) return {cls:'revisar',titulo:'Resultados mixtos',desc:`Métricas inconsistentes. Revisar si ${fmt(c.costoPorR)} se justifica con los resultados.`};
      return {cls:'ok',titulo:'Dentro de rango',desc:'Métricas dentro del benchmark esperado.'};
    }},
  traficoInsta:{icon:'insta',label:'Tráfico — Perfil Instagram',kpiLabel:'KPI: visitas al perfil · CTR · costo/click',benchmark:'Costo < $50/click',
    evaluar(c){
      const s=c.status;
      if(s.includes('GANADOR')) return {cls:'ganador',titulo:'CTR y volumen excelentes',desc:`CTR ${c.ctr?.toFixed(2)}% con costo ${fmt(c.costoPorR)}/click. Contenido que genera curiosidad genuina.`};
      if(s.includes('PAUSAR')) return {cls:'pausar',titulo:'Costo por click alto',desc:`${fmt(c.costoPorR)}/click supera benchmark. Las impresiones llegan pero el contenido no motiva el clic.`};
      if(s.includes('FATIGA')) return {cls:'revisar',titulo:'Audiencia saturada',desc:`Frecuencia ${c.frecuencia?.toFixed(1)}x. Renovar creativo para recuperar CTR.`};
      if(s.includes('REVISAR')) return {cls:'revisar',titulo:'CTR bajo benchmark',desc:`CTR ${c.ctr?.toFixed(2)}% bajo el objetivo. Evaluar cambio de copy o imagen.`};
      return {cls:'ok',titulo:'Dentro de rango',desc:'Métricas de tráfico dentro del rango esperado.'};
    }},
  traficoWeb:{icon:'web',label:'Tráfico Web Conversión',kpiLabel:'KPI: CTR · costo/click',benchmark:'Costo < $80/click',
    evaluar(c){
      const s=c.status;
      if(s.includes('GANADOR')) return {cls:'ganador',titulo:'Tráfico de calidad',desc:`CTR ${c.ctr?.toFixed(2)}% con buen volumen. Creativo funcionando.`};
      if(s.includes('PAUSAR')) return {cls:'pausar',titulo:'Costo muy alto',desc:`${fmt(c.costoPorR)}/click no justifica el gasto. Cambiar creativo.`};
      if(s.includes('FATIGA')) return {cls:'revisar',titulo:'Frecuencia alta',desc:`Frecuencia ${c.frecuencia?.toFixed(1)}x. Renovar audiencia o creativo.`};
      return {cls:'ok',titulo:'Dentro de rango',desc:'Métricas de tráfico web dentro del rango.'};
    }},
  formularios:{icon:'form',label:'Formularios — Leads',kpiLabel:'KPI: costo/lead · volumen',benchmark:'< $90/lead',
    evaluar(c){
      const s=c.status;
      if(s.includes('GANADOR')) return {cls:'ganador',titulo:'Costo por lead excelente',desc:`${fmt(c.costoPorR)}/lead muy por debajo del objetivo. Escalar.`};
      if(s.includes('PAUSAR')) return {cls:'pausar',titulo:'Costo por lead alto',desc:`${fmt(c.costoPorR)}/lead supera el benchmark. Cambiar creativo o segmentación.`};
      return {cls:'ok',titulo:'Dentro de rango',desc:`Costo ${fmt(c.costoPorR)}/lead dentro del objetivo.`};
    }},
  video:{icon:'video',label:'Video — Awareness',kpiLabel:'KPI: Hook Rate · Hold Rate',benchmark:'Hook > 25% · Hold50 > 8%',
    evaluar(c){
      const s=c.status;
      if(s.includes('GANADOR')) return {cls:'ganador',titulo:'Video que engancha',desc:`Hook Rate ${c.hookRate?.toFixed(1)}% excelente. Contenido que captura y retiene atención.`};
      return {cls:'revisar',titulo:'Revisar métricas de video',desc:`Hook Rate ${c.hookRate?.toFixed(1)}%. Evaluar los primeros 3 segundos.`};
    }},
  otro:{icon:'otro',label:'Campaña',kpiLabel:'KPI: según objetivo',benchmark:'—',
    evaluar(c){
      const s=c.status;
      if(s.includes('GANADOR')) return {cls:'ganador',titulo:'Rendimiento excelente',desc:'Métricas por encima del benchmark.'};
      if(s.includes('PAUSAR')) return {cls:'pausar',titulo:'Bajo rendimiento',desc:'Revisar o pausar.'};
      if(s.includes('REVISAR')||s.includes('FATIGA')) return {cls:'revisar',titulo:'Requiere revisión',desc:'Métricas inconsistentes.'};
      return {cls:'ok',titulo:'Dentro de rango',desc:'Métricas dentro del benchmark esperado.'};
    }}
};

// ── HELPERS ────────────────────────────────────────────────────────────────────
function fmt(n){if(n==null||isNaN(n)||n===0) return '—'; return '$'+Math.round(n).toLocaleString('es-CL');}
function fmtN(n,d=0){if(n==null||isNaN(n)) return '—'; return Number(n).toLocaleString('es-CL',{maximumFractionDigits:d});}
function fmtK(n){if(!n||isNaN(n)) return '—'; if(n>=1000000) return '$'+(n/1000000).toFixed(1)+'M'; if(n>=1000) return '$'+(n/1000).toFixed(0)+'K'; return '$'+Math.round(n);}
function fmtAlc(n){if(!n||isNaN(n)) return '—'; if(n>=1000000) return (n/1000000).toFixed(1)+'M'; if(n>=1000) return (n/1000).toFixed(0)+'K'; return Math.round(n).toString();}
function statusCls(s){
  if(!s) return 'neutro';
  const u=s.toUpperCase();
  if(u.includes('GANADOR')) return 'ganador';
  if(u.includes('PAUSAR')) return 'pausar';
  if(u.includes('FATIGA')||u.includes('REVISAR')) return 'revisar';
  if(u.includes('OK')) return 'ok';
  return 'neutro';
}
function statusLabel(s){
  if(!s) return '—';
  const u=s.toUpperCase();
  if(u.includes('GANADOR')) return 'Ganador';
  if(u.includes('PAUSAR')) return 'Pausar';
  if(u.includes('FATIGA')) return 'Fatiga';
  if(u.includes('REVISAR')) return 'Revisar';
  if(u.includes('OK')) return 'OK';
  return s;
}
function detectTipo(nombre){
  const n=(nombre||'').toLowerCase();
  if(n.includes('instagram')||n.includes('perfil')||n.includes('insta')) return 'traficoInsta';
  if(n.includes('tráfico web')||n.includes('trafico web')||n.includes('objetivo convers')) return 'traficoWeb';
  if(n.includes('formulario')||n.includes('lead')) return 'formularios';
  if(n.includes('remarketing')) return 'conversion';
  if(n.includes('catálogo')||n.includes('catalogo')) return 'conversion';
  if(n.includes('video')||n.includes('awareness')) return 'video';
  if(n.includes('convers')||n.includes('ventas')||n.includes('compra')) return 'conversion';
  if(n.includes('tráfico')||n.includes('trafico')) return 'traficoInsta';
  return 'otro';
}
function marcaColor(i){
  const palettes=[
    {bg:'#FBEAF0',color:'#72243E'},
    {bg:'#E6F1FB',color:'#0C447C'},
    {bg:'#EAF3DE',color:'#27500A'},
    {bg:'#F1EFE8',color:'#444441'},
    {bg:'#FAEEDA',color:'#633806'},
    {bg:'#E1F5EE',color:'#085041'},
  ];
  return palettes[i % palettes.length];
}
function marcaHealth(m){
  const hasPausa = m.campanas.some(c=>c.status&&c.status.toUpperCase().includes('PAUSAR'));
  const hasRevisar = m.campanas.some(c=>c.status&&(c.status.toUpperCase().includes('REVISAR')||c.status.toUpperCase().includes('FATIGA')));
  const hasGanador = m.campanas.some(c=>c.status&&c.status.toUpperCase().includes('GANADOR'));
  if(hasPausa) return 'red';
  if(hasRevisar) return 'amber';
  if(hasGanador) return 'green';
  return 'gray';
}

// ── PARSE EXCEL ────────────────────────────────────────────────────────────────
const COL_DEFAULTS={CAMP:1,ALC:2,IMP:3,FRQ:4,RES:5,RES_ANT:6,PCT:7,GASTO:8,COSTO:9,CTR:10,CPM:11,HOOK:12,HOLD50:13,HOLD75:14,HOLD100:15,ROAS:16,CLICKS:17,STATUS:18,GASTO_ANT:19};

function parseExcel(buffer){
  const wb=XLSX.read(buffer,{type:'array'});
  const sheetName=wb.SheetNames.find(s=>s.toUpperCase().includes('RESULTADO'))||wb.SheetNames[0];
  const ws=wb.Sheets[sheetName];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  let headerRow=-1;
  for(let i=0;i<rows.length;i++){
    const r=rows[i];
    if(r.some(c=>String(c||'').toUpperCase().trim()==='STATUS')){headerRow=i;break;}
  }
  if(headerRow===-1){
    for(let i=0;i<rows.length;i++){
      const r=rows[i];
      const hasCamp=r.some(c=>String(c||'').toLowerCase().includes('campaña')||String(c||'').toLowerCase().includes('anuncio'));
      const hasGasto=r.some(c=>String(c||'').toLowerCase().includes('gasto'));
      if(hasCamp&&hasGasto){headerRow=i;break;}
    }
  }
  let dynCol={...COL_DEFAULTS};
  if(headerRow>=0){
    const hdrs=rows[headerRow].map(h=>String(h||'').toLowerCase().trim());
    const find=(...terms)=>{for(const t of terms){const i=hdrs.findIndex(h=>h.includes(t));if(i>=0) return i;} return -1;};
    const c=find('campaña','campaign','anuncio'); if(c>=0) dynCol.CAMP=c;
    const g=find('gasto'); if(g>=0) dynCol.GASTO=g;
    const ra=find('resultado ant','result ant','res ant'); if(ra>=0) dynCol.RES_ANT=ra;
    const r=find('resultados','results'); if(r>=0) dynCol.RES=r;
    if(r<0){
      // Fallback: buscar 'resultado' pero excluir la columna de ant que ya encontramos
      const hdrs2=rows[headerRow].map(h=>String(h||'').toLowerCase().trim());
      const ri=hdrs2.findIndex((h,i)=>h.includes('resultado')&&!h.includes('ant')&&i!==dynCol.RES_ANT);
      if(ri>=0) dynCol.RES=ri;
    }
    const s=find('status'); if(s>=0) dynCol.STATUS=s;
    const ct=find('ctr'); if(ct>=0) dynCol.CTR=ct;
    const ro=find('roas'); if(ro>=0) dynCol.ROAS=ro;
    const h=find('hook rate'); if(h>=0) dynCol.HOOK=h;
    const h5=find('hold rate 50','hold 50'); if(h5>=0) dynCol.HOLD50=h5;
    const h7=find('hold rate 75','hold 75'); if(h7>=0) dynCol.HOLD75=h7;
    const fr=find('frecuencia'); if(fr>=0) dynCol.FRQ=fr;
    const co=find('costo/result','costo/r'); if(co>=0) dynCol.COSTO=co;
    const cp=find('cpm'); if(cp>=0) dynCol.CPM=cp;
    const al=find('alcance'); if(al>=0) dynCol.ALC=al;
    const im=find('impresion'); if(im>=0) dynCol.IMP=im;
    const cl=find('click'); if(cl>=0) dynCol.CLICKS=cl;
  }
  const marcas=[];
  let currentMarca=null, currentCamp=null;
  const startRow=headerRow>=0?headerRow+1:0;
  for(let i=startRow;i<rows.length;i++){
    const row=rows[i];
    const rawCell=row[dynCol.CAMP];
    if(rawCell===''||rawCell===null||rawCell===undefined) continue;
    const rawName=String(rawCell).trimEnd();
    const name=rawName.trim().replace(/^[🆕]+\s*/,'');
    if(!name) continue;
    if((name.startsWith('TOTAL ')||name.startsWith('SUBTOTAL'))&&!name.startsWith('TOTAL  ')){
      if(currentMarca&&name.startsWith('TOTAL ')){
        const g=parseFloat(row[dynCol.GASTO])||0;
        const r=parseFloat(row[dynCol.RES])||0;
        const a=parseFloat(row[dynCol.ALC])||0;
        if(g>0) currentMarca.totalGasto=g;
        if(r>0) currentMarca.totalRes=r;
        if(a>0) currentMarca.totalAlcance=a;
      }
      currentCamp=null; continue;
    }
    if(name.startsWith('▸')||name.startsWith('►')||rawName.includes('▸')||rawName.includes('►')){
      const campName=name.replace(/^[▸►\s]+/,'').trim();
      if(currentMarca){
        currentCamp={nombre:campName,tipo:detectTipo(campName),anuncios:[],
          gasto:0,resultados:0,costoPorR:0,ctr:0,roas:0,frecuencia:0,hookRate:0,hold50:0,alcance:0,status:''};
        currentMarca.campanas.push(currentCamp);
      }
      continue;
    }
    const gastoVal=row[dynCol.GASTO];
    const tieneGasto=gastoVal!==''&&gastoVal!==null&&!isNaN(parseFloat(gastoVal));
    const esMarca=!tieneGasto&&name===name.toUpperCase()&&name.length>1&&!/\d/.test(name)&&name.trim()!=='';
    if(esMarca){
      currentMarca={nombre:name,campanas:[],totalGasto:0,totalRes:0,totalAlcance:0};
      marcas.push(currentMarca); currentCamp=null; continue;
    }
    if(currentMarca&&currentCamp){
      const gasto=parseFloat(row[dynCol.GASTO])||0;
      const res=parseFloat(row[dynCol.RES])||0;
      const costoPorR=parseFloat(row[dynCol.COSTO])||0;
      const ctr=parseFloat(row[dynCol.CTR])||0;
      const roas=parseFloat(row[dynCol.ROAS])||0;
      const frq=parseFloat(row[dynCol.FRQ])||0;
      const hookRate=parseFloat(row[dynCol.HOOK])||0;
      const hold50=parseFloat(row[dynCol.HOLD50])||0;
      const hold75=parseFloat(row[dynCol.HOLD75])||0;
      const cpm=parseFloat(row[dynCol.CPM])||0;
      const clicks=parseFloat(row[dynCol.CLICKS])||0;
      const alcance=parseFloat(row[dynCol.ALC])||0;
      const status=String(row[dynCol.STATUS]||'').trim();
      const pct=String(row[dynCol.PCT]||'').replace('%','').trim();
      const resAnt=parseFloat(row[dynCol.RES_ANT])||0;
      currentCamp.anuncios.push({nombre:name,gasto,resultados:res,pctCambio:pct,resAnterior:resAnt,costoPorR,ctr,roas,frecuencia:frq,hookRate,hold50,hold75,cpm,clicks,alcance,status});
      currentCamp.gasto+=gasto;
      currentCamp.resultados+=res;
      currentCamp.alcance+=alcance;
      if(hookRate>currentCamp.hookRate) currentCamp.hookRate=hookRate;
      if(ctr>0&&ctr>currentCamp.ctr) currentCamp.ctr=ctr;
      if(roas>0&&roas>currentCamp.roas) currentCamp.roas=roas;
      if(frq>0&&frq>currentCamp.frecuencia) currentCamp.frecuencia=frq;
      if(hold50>0&&hold50>currentCamp.hold50) currentCamp.hold50=hold50;
      if(gasto>0&&status){
        const priority={'PAUSAR':5,'FATIGA':4,'REVISAR':3,'OK':2,'GANADOR':1};
        const curP=Object.entries(priority).find(([k])=>currentCamp.status.toUpperCase().includes(k));
        const curScore=curP?curP[1]:0;
        const newP=Object.entries(priority).find(([k])=>status.toUpperCase().includes(k));
        const newScore=newP?newP[1]:0;
        if(newScore>curScore||!currentCamp.status) currentCamp.status=status;
      }
    }
  }
  marcas.forEach(m=>{
    if(!m.totalGasto) m.totalGasto=m.campanas.reduce((s,c)=>s+c.gasto,0);
    if(!m.totalRes) m.totalRes=m.campanas.reduce((s,c)=>s+c.resultados,0);
    if(!m.totalAlcance) m.totalAlcance=m.campanas.reduce((s,c)=>s+c.alcance,0);
    m.campanas.forEach(c=>{
      if(c.resultados>0&&!c.costoPorR) c.costoPorR=c.gasto/c.resultados;
      if(!c.status) c.status='✅ OK';
    });
  });

  // ── Parse insights Claude from Excel ────────────────────────────
  // XLSX.js {header:1} starts at index 0 = col B (first used column).
  // dynCol.CAMP == 0 (col B). Offsets: tipo=+1(C), titulo=+2(D), desc=+6(H), accion=+11(M)
  const insMap={};
  let inIns=false,insMarca=null,insCamp=null,insResumenDone=false;
  const CI=dynCol.CAMP; // col B = index 0
  for(let i=startRow;i<rows.length;i++){
    const row=rows[i];
    const b=String(row[CI]||'').trim();   // col B
    if(b.startsWith('💡')){
      inIns=true; insResumenDone=false; insCamp=null;
      const m=b.match(/—\s*(.+)$/);
      insMarca=m?m[1].trim():null;
      if(insMarca) insMap[insMarca.toUpperCase()]={resumen:'',hallazgos:[]};
      continue;
    }
    if(!inIns||!insMarca){if(!b)continue; continue;}
    // In insights mode — process even when col B is empty (subsequent hallazgos)
    const ins=insMap[insMarca.toUpperCase()];
    const colTipo=String(row[CI+1]||'').trim(); // col C
    // Exit insights if we hit a new uppercase brand row
    if(b&&b===b.toUpperCase()&&b.length>1&&!/\d/.test(b)){inIns=false;insMarca=null;continue;}
    // Resumen row: col B has text, col C empty
    if(!insResumenDone&&b&&!colTipo&&b.length>15&&b.toLowerCase()!=='campaña'){
      ins.resumen=b; insResumenDone=true; continue;
    }
    if(b.toLowerCase()==='campaña') continue; // column header row
    // Hallazgo rows — identified by tipo emoji in col C (even if col B is empty)
    if(colTipo.includes('🔴')||colTipo.includes('🟢')||colTipo.includes('🔵')){
      if(b) insCamp=b;
      const tipo=colTipo.includes('🔴')?'alerta':colTipo.includes('🟢')?'oportunidad':'insight';
      ins.hallazgos.push({
        camp:insCamp||'',tipo,
        titulo:String(row[CI+2]||'').trim(),   // col D
        desc:  String(row[CI+6]||'').trim(),   // col H
        accion:String(row[CI+11]||'').trim()   // col M
      });
    }
  }
  // Attach resumen and hallazgos to each marca/campaña
  marcas.forEach(m=>{
    const ins=insMap[m.nombre.toUpperCase()];
    if(!ins) return;
    m.insightResumen=ins.resumen;
    m.campanas.forEach(c=>{
      c.hallazgos=ins.hallazgos.filter(h=>{
        const hc=(h.camp||'').toLowerCase().trim();
        const cn=(c.nombre||'').toLowerCase().trim();
        return hc&&(hc===cn||cn.includes(hc)||hc.includes(cn.slice(0,30)));
      });
    });
  });

  return marcas;
}

// ── ICONS ──────────────────────────────────────────────────────────────────────
function typeIcon(tipo){
  const icons={
    conversion:'<svg viewBox="0 0 16 16" style="width:14px;height:14px;stroke:var(--mid);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><circle cx="8" cy="8" r="6"/><path d="M6 8l1.5 1.5L10 6"/></svg>',

function mesNombre(i){return['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'][i]||'';}
function rangoFechas(name){
  const n=(name||'').toLowerCase();
  const meses={enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12};
  let mesAct=0,anio=0;
  for(const [k,v] of Object.entries(meses)){if(n.includes(k)){mesAct=v;break;}}
  const mm=n.match(/20[0-9][0-9]/); if(mm) anio=parseInt(mm[0]);
  if(!mesAct||!anio) return '';
  const diasAct=new Date(anio,mesAct,0).getDate();
  const mesAntN=mesAct===1?12:mesAct-1;
  const anioAnt=mesAct===1?anio-1:anio;
  const diasAnt=new Date(anioAnt,mesAntN,0).getDate();
  return '1–'+diasAct+' '+mesNombre(mesAct-1)+' '+anio+' vs 1–'+diasAnt+' '+mesNombre(mesAntN-1)+' '+anioAnt;
}

function fmtDelta(actual, anterior, invertir){
  if(!anterior||anterior===0) return '<span style="color:var(--lt)">—</span>';
  const d=((actual-anterior)/anterior)*100;
  const good=invertir?d<0:d>0;
  const col=good?'var(--green400)':'var(--red400)';
  return '<span style="color:'+col+';font-weight:500">'+(d>0?'+':'')+d.toFixed(1)+'%</span>';
}
function buildCampTable(c){
  const resAnt=c.resAnterior||0;
  const th='<th style="padding:6px 10px;text-align:right;font-size:10px;font-weight:600;color:var(--lt);text-transform:uppercase;letter-spacing:.06em;border-bottom:0.5px solid var(--bdr)">';
  const rows=[
    ['Resultados', fmtN(c.resultados), resAnt>0?fmtN(resAnt):'—', fmtDelta(c.resultados,resAnt,false)],
    ['Costo/resultado', fmt(c.costoPorR), '—', '—'],
    ['ROAS', c.roas>0?c.roas.toFixed(2)+'x':'—', '—', '—'],
    ['Gasto', fmtK(c.gasto), '—', '—'],
  ];
  return '<div style="border-top:0.5px solid var(--bdr)"><table style="width:100%;border-collapse:collapse;font-size:12px">'
    +'<thead><tr style="background:var(--bg)">'
    +'<th style="padding:6px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--lt);text-transform:uppercase;letter-spacing:.06em;border-bottom:0.5px solid var(--bdr)"></th>'
    +th+'Actual</th>'+th+'Anterior</th>'+th+'Δ%</th></tr></thead><tbody>'
    +rows.map((r,i)=>'<tr style="background:'+(i%2?'var(--bg)':'var(--sur)')+'"><td style="padding:6px 14px;font-size:11px;font-weight:500;color:var(--lt);text-transform:uppercase;letter-spacing:.04em">'+r[0]+'</td>'
      +'<td style="padding:6px 10px;text-align:right;font-weight:500;color:var(--dk)">'+r[1]+'</td>'
      +'<td style="padding:6px 10px;text-align:right;color:var(--lt)">'+r[2]+'</td>'
      +'<td style="padding:6px 10px;text-align:right">'+r[3]+'</td></tr>').join('')
    +'</tbody></table></div>';
}
function renderCamp(c, forceOpen){
  const tipo=TIPOS[c.tipo]||TIPOS.otro;
  const ev=tipo.evaluar(c);
  const campId='camp-'+Math.random().toString(36).slice(2);
  const ads=c.anuncios.filter(a=>a.gasto>0);
  const bestAd=ads.length?ads.reduce((b,a)=>(!b||(a.resultados>(b.resultados||0)))?a:b,null):null;
  const worstAd=ads.length>1?ads.reduce((w,a)=>(!w||(a.costoPorR>0&&a.costoPorR>(w.costoPorR||0)))?a:w,null):null;
  const hasProblem=ev.cls==='pausar'||ev.cls==='revisar';
  const cols='1fr 72px 72px 55px 72px 55px 62px';

  let adsHtml='';
  if(ads.length){
    adsHtml=`<div class="ad-section" id="${campId}">
      <div class="ad-hdr" style="grid-template-columns:${cols}">
        <span>Anuncio</span><span style="text-align:right">Res. actual</span><span style="text-align:right">Res. ant.</span><span style="text-align:right">Δ%</span><span style="text-align:right">Costo/R</span><span style="text-align:right">ROAS</span><span style="text-align:right">Gasto</span>
      </div>`;
    ads.forEach(a=>{
      const isBest=bestAd&&a.nombre===bestAd.nombre&&ads.length>1;
      const isWorst=worstAd&&a.nombre===worstAd.nombre&&ads.length>1&&ev.cls==='pausar';
      const rowCls=isBest?'best':isWorst?'bad':'';
      const hookPct=Math.min(a.hookRate||0,100);
      const hookColor=hookPct>=25?'var(--green400)':hookPct>=10?'var(--amber400)':'var(--red400)';
      const cosCls=a.costoPorR>0?(a.costoPorR<10000?'good':a.costoPorR>18000?'bad':''):'muted';
      adsHtml+=`<div class="ad-row ${rowCls}" style="grid-template-columns:${cols}">
        <div class="ad-name-wrap">
          <span class="ad-name" title="${a.nombre}">${a.nombre}</span>
          ${isBest?'<span class="ad-tag best">mejor</span>':''}
          ${isWorst?'<span class="ad-tag pause">pausar</span>':''}
        </div>
        <span class="ad-cell muted" style="text-align:right">${fmtN(a.resultados)}</span>
        <span class="ad-cell muted" style="text-align:right">${a.resAnterior>0?fmtN(a.resAnterior):'—'}</span>
        <span class="ad-cell ${(()=>{if(!a.resAnterior||a.resAnterior===0)return 'muted';const d=(a.resultados-a.resAnterior)/a.resAnterior*100;return d>0?'good':'bad';})()} " style="text-align:right">${(()=>{if(!a.resAnterior||a.resAnterior===0)return '—';const d=(a.resultados-a.resAnterior)/a.resAnterior*100;return (d>0?'+':'')+d.toFixed(1)+'%';})()}</span>
        <span class="ad-cell ${cosCls}" style="text-align:right">${fmt(a.costoPorR)}</span>
        <span class="ad-cell muted" style="text-align:right">${a.roas>0?a.roas.toFixed(2)+'x':'—'}</span>
        <span class="ad-cell muted" style="text-align:right">${fmtK(a.gasto)}</span>
      </div>`;
    });
    adsHtml+='</div>';
  }

  const hasInsights=c.hallazgos&&c.hallazgos.length>0;
  const forceOpenCard=hasProblem||hasInsights;
  let insHtml='';
  if(hasInsights){
    insHtml=`<div class="ins-section">
      <div class="ins-hdr">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><line x1="8" y1="6" x2="8" y2="6"/><line x1="8" y1="9" x2="8" y2="12"/></svg>
        Análisis Claude
      </div>`;
    c.hallazgos.forEach(h=>{
      const tag=h.tipo==='alerta'?'🔴 Alerta':h.tipo==='oportunidad'?'🟢 Oportunidad':'🔵 Insight';
      insHtml+=`<div class="hallazgo-card ${h.tipo}">
        <div class="hallazgo-tipo">${tag}</div>
        <div class="hallazgo-titulo">${h.titulo}</div>
        ${h.desc?`<div class="hallazgo-desc">${h.desc}</div>`:''}
        ${h.accion?`<div class="hallazgo-accion-lbl">Acción</div><div class="hallazgo-accion">${h.accion}</div>`:''}
      </div>`;
    });
    insHtml+='</div>';
  }

  return `<div class="camp-card">
    <div class="camp-hdr" onclick="toggleCamp('${campId}','${campId}-chev')">
      <div class="camp-type-icon">${typeIcon(c.tipo)}</div>
      <div class="camp-info">
        <div class="camp-name">${c.nombre}</div>
        <div class="camp-kpi-label">${tipo.kpiLabel} · ${tipo.benchmark}</div>
      </div>
      <div class="camp-right">
        <span class="camp-spend">${fmtK(c.gasto)}</span>
        <span class="status-pill ${ev.cls}">${statusLabel(c.status)}</span>
        <svg id="${campId}-chev" class="chev${forceOpenCard?' open':''}" viewBox="0 0 16 16"><polyline points="6,4 10,8 6,12"/></svg>
      </div>
    </div>
    <div id="${campId}" style="display:${forceOpenCard?'block':'none'}">
      <div style="padding:8px 16px 12px;border-top:0.5px solid var(--bdr);margin-top:8px">
        <div style="font-size:12px;color:var(--mid);line-height:1.6">${ev.desc}</div>
      </div>
      ${adsHtml}
      ${insHtml}
    </div>
  </div>`;
}

function toggleCamp(bodyId, chevId){
  const el=document.getElementById(bodyId);
  const chev=document.getElementById(chevId);
  if(!el) return;
  const open=el.style.display!=='none';
  el.style.display=open?'none':'block';
  if(chev) chev.classList.toggle('open',!open);
}

// ── SYSTEM PROMPT ─────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `Eres el director de marketing digital de Seducete.cl, empresa chilena de belleza con operación mixta: e-commerce online + tiendas físicas en Chile. Gestionas inversión en Meta Ads para 6 marcas propias.

## MARCAS DEL PORTAFOLIO
- Seducete: belleza general + academia de cursos presenciales y online (marca principal, mayor inversión)
- GoNails: uñas y nail art, audiencia muy comprometida, fuerte en tutoriales
- GoHair: cabello y coloración, competencia alta
- Bluesky: nail gel y productos pro para nail artists profesionales
- Nail Pro: productos profesionales, ticket alto, audiencia pequeña y específica
- Le Mini Macaron: nail en casa estilo lifestyle, estética premium, Gen Z y millennials

## CLIENTE OBJETIVO
Mujeres chilenas 20–45 años, interesadas en belleza y autocuidado. Activas en Instagram. Mix de consumidoras finales y profesionales del rubro (nail artists, estilistas).

## RESTRICCIÓN FUNDAMENTAL
Los presupuestos son FIJOS. No se redistribuyen entre campañas ni marcas.
NUNCA sugieras mover, aumentar o redistribuir presupuesto. La única palanca es el contenido creativo.

## FRAMEWORK DE ANÁLISIS (en este orden)
1. ¿Se logró el KPI de esta campaña específica?
2. ¿La eficiencia justifica el gasto? (ROAS, costo/click, costo/lead, Hook Rate)
3. ¿El costo está dentro del benchmark?
4. ¿El creativo está funcionando? (Hook Rate, Hold Rate, frecuencia)
5. Decisión concreta sobre el anuncio

## BENCHMARKS POR TIPO DE CAMPAÑA (en CLP)
Compras: ganadora < $6.000 | OK < $10.000 | revisar $10k–$18k | pausar > $18.000
Leads: ganadora < $50 | OK < $90 | revisar $90–$150 | pausar > $150
Tráfico clicks: ganadora < $20 | OK < $40 | revisar $40–$80 | pausar > $80
Video / visita perfil: ganadora < $20 | OK < $40 | revisar $40–$80 | pausar > $80

## MÉTRICAS DE CREATIVO
Hook Rate > 25%: bueno | 15–25%: aceptable | < 15%: cambiar apertura del video
Hold Rate 50% > 12%: la historia engancha | < 8%: pierde audiencia a la mitad
Frecuencia > 3.5x: señal de fatiga | > 5x: pausar urgente
Rotación de creativos: cada 2 semanas es el ciclo normal de esta empresa

## FECHAS CLAVE CHILE
CyberDay (mayo), Día de la Madre (mayo), CyberWeek/Black Friday (noviembre), Navidad (diciembre), Vuelta a clases (marzo), Temporada baja julio–agosto.
Caída de ROAS en CyberDay o Black Friday es normal por competencia de CPM — no pausar por eso.

## CONTEXTO ONLINE/FÍSICO
Una campaña de tráfico al perfil con CTR bajo puede ser válida si hay tráfico en tiendas físicas. No todas las conversiones son medibles en Meta.

## FORMATO DE RESPUESTA
Responde siempre en español chileno, directo y sin rodeos. Estructura por campaña:
- Estado: [Ganador / OK / Revisar / Pausar]
- Por qué: 1–2 oraciones con los números clave exactos
- Acción: qué hacer exactamente con el creativo (pausar, mantener, rotar, replicar formato)

NUNCA uses lenguaje vago. NUNCA inventes métricas. NUNCA sugieras cambios de audiencia o presupuesto.`;

function buildCampContext(camp, marcaNombre){
  const tipo = TIPOS[camp.tipo]||TIPOS.otro;
  const ads = camp.anuncios.filter(a=>a.gasto>0);
  let ctx = `Marca: ${marcaNombre}\nCampaña: ${camp.nombre}\nTipo: ${tipo.label}\n`;
  ctx += `Gasto: ${fmt(camp.gasto)} | Alcance: ${fmtAlc(camp.alcance)} | Resultados: ${fmtN(camp.resultados)}\n`;
  ctx += `Costo/resultado: ${fmt(camp.costoPorR)} | CTR: ${camp.ctr>0?camp.ctr.toFixed(2)+'%':'—'} | ROAS: ${camp.roas>0?camp.roas.toFixed(2)+'x':'—'}\n`;
  ctx += `Hook Rate: ${camp.hookRate>0?camp.hookRate.toFixed(1)+'%':'—'} | Hold 50%: ${camp.hold50>0?camp.hold50.toFixed(1)+'%':'—'} | Frecuencia: ${camp.frecuencia>0?camp.frecuencia.toFixed(1)+'x':'—'}\n`;
  ctx += `Status actual: ${camp.status}\n`;
  if(ads.length){
    ctx += `\nAnuncios individuales:\n`;
    ads.forEach(a=>{
      ctx += `  · ${a.nombre} | Gasto: ${fmt(a.gasto)} | Costo/R: ${fmt(a.costoPorR)} | Hook: ${a.hookRate>0?a.hookRate.toFixed(1)+'%':'—'} | Status: ${a.status}\n`;
    });
  }
  return ctx;
}

function openAskClaude(campNombre, marcaNombre){
  const marca = allMarcas.find(m=>m.nombre===marcaNombre);
  if(!marca) return;
  const camp = marca.campanas.find(c=>c.nombre===campNombre);
  if(!camp) return;
  window._askClaudeCamp = camp;
  window._askClaudeMarca = marcaNombre;
  const ctx = buildCampContext(camp, marcaNombre);
  document.getElementById('modalCampName').textContent = campNombre;
  document.getElementById('modalContext').textContent = ctx;
  document.getElementById('modalQuestion').value = '';
  document.getElementById('modalAnswer').innerHTML = '';
  document.getElementById('modalAnswer').style.display = 'none';
  document.getElementById('askModal').style.display = 'flex';
}

function closeModal(){
  document.getElementById('askModal').style.display = 'none';
}

async function submitAskClaude(){
  const question = document.getElementById('modalQuestion').value.trim();
  const camp = window._askClaudeCamp;
  const marcaNombre = window._askClaudeMarca;
  if(!question || !camp) return;
  const btn = document.getElementById('modalSubmitBtn');
  btn.textContent = 'Analizando...'; btn.disabled = true;
  const answerEl = document.getElementById('modalAnswer');
  answerEl.style.display = 'block';
  answerEl.innerHTML = '<div style="display:flex;align-items:center;gap:8px;color:var(--lt);font-size:12px"><div class="spinner" style="width:16px;height:16px;border-width:2px;margin:0"></div> Claude está analizando...</div>';
  const ctx = buildCampContext(camp, marcaNombre);
  const userMsg = `${ctx}\nPregunta: ${question}`;
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system: SYSTEM_PROMPT,
        messages:[{role:'user', content: userMsg}]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || 'Sin respuesta.';
    answerEl.innerHTML = `<div style="font-size:13px;line-height:1.7;color:var(--dk);white-space:pre-wrap">${text}</div>`;
  }catch(e){
    answerEl.innerHTML = `<div style="font-size:12px;color:var(--red400)">Error al conectar con Claude: ${e.message}</div>`;
  }finally{
    btn.textContent = 'Analizar'; btn.disabled = false;
  }
}

// ── GITHUB ─────────────────────────────────────────────────────────────────────
async function listReports(){
  try{
    const r=await fetch(BASE_URL+'/index.json?t='+Date.now());
    if(r.ok){
      const list=await r.json();
      if(list&&list.length) return list.map(name=>({name,download_url:RAW_URL+'/'+name})).sort((a,b)=>b.name.localeCompare(a.name));
    }
  }catch{}
  try{
    const apiUrl=`https://api.github.com/repos/paularoehling/meta-ads-dashboard/contents/reportes?t=${Date.now()}`;
    const r=await fetch(apiUrl,{headers:{'Accept':'application/vnd.github.v3+json'}});
    if(r.ok){
      const files=await r.json();
      const excels=files.filter(f=>f.name.endsWith('.xlsx')).sort((a,b)=>b.name.localeCompare(a.name));
      if(excels.length) return excels.map(f=>({name:f.name,download_url:RAW_URL+'/'+f.name}));
    }
  }catch{}
  return [{name:'Reporte_abril_2026.xlsx',download_url:RAW_URL+'/Reporte_abril_2026.xlsx'}];
}
async function downloadReport(file){
  const r=await fetch(file.download_url+'?t='+Date.now());
  if(!r.ok) throw new Error('Error descargando '+file.name);
  return r.arrayBuffer();
}
async function loadReport(name){
  const report=allReports.find(r=>r.name===name);
  if(!report) return;
  document.getElementById('mainContent').innerHTML=`<div class="state-box"><div class="spinner"></div><div class="state-title">Cargando ${name.replace('Reporte_','').replace('.xlsx','')}...</div></div>`;
  try{
    const buf=await downloadReport(report);
    allMarcas=parseExcel(buf);
    currentReport=name;
    if(!activeMarca&&allMarcas.length) activeMarca=allMarcas[0].nombre;
    renderPeriodButtons(allReports,name);
    renderHistorial(allReports,name);
    renderSidebar(allMarcas);
    renderContent();
  }catch(e){
    document.getElementById('mainContent').innerHTML=`<div class="error-box"><p>Error cargando ${name}: ${e.message}</p></div>`;
  }
}
async function syncGitHub(){
  const btn=document.getElementById('syncBtn');
  btn.textContent='Cargando...'; btn.disabled=true;
  try{
    allReports=await listReports();
    if(!allReports.length) throw new Error('No hay reportes');
    renderPeriodButtons(allReports,allReports[0].name);
    await loadReport(allReports[0].name);
  }catch(e){
    document.getElementById('mainContent').innerHTML=`<div class="error-box"><p>No se pudo conectar: ${e.message}</p></div>`;
  }finally{
    btn.innerHTML='<svg viewBox="0 0 16 16" style="width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5"/><polyline points="13.5,2.5 13.5,5.5 10.5,5.5"/></svg> Sincronizar';
    btn.disabled=false;
  }
}
syncGitHub();
